name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Least-privilege default — limits blast radius if a step is compromised.
# Jobs needing more access declare it explicitly at the job level.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: "pnpm"
      # --frozen-lockfile enforces exact pnpm-lock.yaml versions and fails if the
      # lock file is stale — prevents silently picking up newly published (possibly
      # malicious) versions. The onlyBuiltDependencies allowlist in package.json
      # restricts which packages may run install scripts.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run monorepo QA
        run: pnpm qa

  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # OSV checks pnpm-lock.yaml against the OSV vulnerability database.
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on PRs — blocks introduction of newly vulnerable packages.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
